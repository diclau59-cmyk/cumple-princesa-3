<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Para Mi Princesa Perfecta 💛</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<section id="cover" class="cover">
  <div class="night-glow"></div>

  <div class="envelope" id="envelope">
    <div class="envelope-back"></div>
    <div class="letter-peek">
      <h1>Para Mi Princesa</h1>
      <p>Un pequeño regalo hecho con mucho amor.</p>
    </div>
    <div class="flap"></div>
    <div class="envelope-front"></div>
    <button id="openBtn" class="open-btn">💌 Abrir mi regalo 🌻</button>
  </div>
</section>

<main id="page" class="page hidden">
  <div class="sun-glow"></div>

  <section class="scene">
    <article class="scroll-card">
      <div class="scroll-top"></div>
      <div class="scroll-paper">
        <h1>🌻 Para Mi Princesa Perfecta 🌻</h1>
        <div class="divider">— 💛 —</div>
        <div id="typedText" class="typed-text"></div>
        <h2 id="finalTitle" class="final-title hidden">❤️ Feliz Cumpleaños, mi Princesa Perfecta 🌻</h2>
        <button id="heartBtn" class="heart-btn hidden">Siempre te voy a elegir a ti ❤️</button>
        <div id="signature" class="signature hidden">✨ Siempre sere tuyo ✨</div>
      </div>
      <div class="scroll-bottom"></div>
    </article>

    <aside class="purin-zone">
      <div class="speech">🌻 ¡Feliz Cumpleaños! 💛</div>
      <img src="pompompurin.png" class="purin" alt="Pompompurin con girasol">
    </aside>
  </section>

  <div id="fireworks" class="fireworks hidden">
    <div class="firework f1">✨</div>
    <div class="firework f2">💛</div>
    <div class="firework f3">🌻</div>
    <div class="firework f4">❤️</div>
    <h2>Te amo muchísimo 💛</h2>
  </div>

  <div class="player">
    <button id="musicBtn" class="music-btn">
      <span id="musicIcon" class="music-icon">▶</span>
      <span>
        <strong>Nuestra canción</strong>
        <small>Sienna 💛</small>
      </span>
    </button>
    <audio id="audio" loop>
      <source src="sienna.mp3" type="audio/mpeg">
    </audio>
  </div>
</main>

<script src="script.js"></script>
</body>
</html>
